 <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<body>
  <!-- React Root -->
  <div id="root"></div>

  <!-- Main Application Script -->
  <script type="text/babel">
/****************************************************
 * PART 1 — 全域常數、工具函式（含金額千分位表示）
 ****************************************************/

// Google Sheet CSV URLs
const CSV_URLS = {
  material: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4AmTB3LJQYXPtKDAyY3efChJ1EMU5qlAfMzZ33_qqcVPhIAinukL8IVGq8RTCpIOf7O_bf-xHh5My/pub?gid=0&single=true&output=csv",
  purchase: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4AmTB3LJQYXPtKDAyY3efChJ1EMU5qlAfMzZ33_qqcVPhIAinukL8IVGq8RTCpIOf7O_bf-xHh5My/pub?gid=1300343145&single=true&output=csv",
  fabrication: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4AmTB3LJQYXPtKDAyY3efChJ1EMU5qlAfMzZ33_qqcVPhIAinukL8IVGq8RTCpIOf7O_bf-xHh5My/pub?gid=1755952578&single=true&output=csv",
  transport: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4AmTB3LJQYXPtKDAyY3efChJ1EMU5qlAfMzZ33_qqcVPhIAinukL8IVGq8RTCpIOf7O_bf-xHh5My/pub?gid=11669107&single=true&output=csv",
  install: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4AmTB3LJQYXPtKDAyY3efChJ1EMU5qlAfMzZ33_qqcVPhIAinukL8IVGq8RTCpIOf7O_bf-xHh5My/pub?gid=183776968&single=true&output=csv"
};

// 金額千分位格式化
function formatMoney(num) {
  if (isNaN(num)) return "0";
  return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

// 重量小數兩位
function formatWeight(num) {
  if (isNaN(num)) return "0.00";
  return Number(num).toFixed(2);
}

// CSV 解析
function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",");
  return lines.slice(1).map(line => {
    const cols = line.split(",");
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = cols[i]?.trim());
    return obj;
  });
}
function parseTransportRow(r) {
  return {
    category: r[0],     // 車種
    spec: r[1],         // 項目
    region: r[2],       // 地區（南/北/中）
    unit: r[3],         // 單位（台）
    price: Number(r[4] || 0)  // 單價（數字）
  };
}

/****************************************************
 * PART X — 工程資料儲存 / 讀取
 ****************************************************/

// 五大成本的手動調整預設值（新版：物件結構）
const defaultManualAdjust = {
  material: 0,
  purchase: 0,
  fabrication: 0,
  transport: 0,
  install: 0
};

// 🚀 強化版：永不壞掉的 saveProjects()
function saveProjects(data) {
  try {
    if (!data || typeof data !== "object") return;
    localStorage.setItem("projects_v3", JSON.stringify(data));
  } catch (err) {
    console.error("saveProjects() 寫入錯誤：", err);
  }
}

// 🚀 強化版：永不白屏的 loadProjects()
function loadProjects() {
  try {
    const raw = localStorage.getItem("projects_v3");

    // 第一次使用 → 回傳空物件
    if (!raw) return {};

    const parsed = JSON.parse(raw);

    // 壞掉資料 → 自動重置
    if (!parsed || typeof parsed !== "object") return {};

    // 修補每一個工程資料
    for (const key in parsed) {
      const proj = parsed[key];

      // 工程不存在 或 結構錯誤 → 重建
      if (!proj || typeof proj !== "object") {
        parsed[key] = {
          allItems: [],
          manualAdjustDetail: { ...defaultManualAdjust }
        };
        continue;
      }

      // allItems 保證為陣列
      if (!Array.isArray(proj.allItems)) {
        proj.allItems = [];
      }

      // 新版人工調整欄位
      if (!proj.manualAdjustDetail || typeof proj.manualAdjustDetail !== "object") {
        proj.manualAdjustDetail = { ...defaultManualAdjust };
      }
    }

    return parsed;
  } catch (err) {
    console.error("loadProjects() 發生錯誤，localStorage 可能損毀：", err);
    return {}; // 保護 App 不掛掉
  }
}
 /****************************************************
 * PART 2 — 多工程管理 ProjectManager（第 2 段）
 ****************************************************/

// 多工程管理
function ProjectManager({ currentProject, setCurrentProject, projects, setProjects, deleteFromCloud }) {
  // 新增工程
  function addProject() {
    const name = prompt("請輸入工程名稱：");
    if (!name) return;

    if (projects[name]) {
      alert("工程名稱已存在！");
      return;
    }

    const updated = {
      ...projects,
      [name]: {
        allItems: [],
        manualAdjust: 0   // ★ 正確寫法
      }
    };

    setProjects(updated);
    setCurrentProject(name);
    saveProjects(updated);
  }

  // 🚀 修改：刪除工程（含雲端同步）
  async function deleteProject(name) {
  if (!window.confirm(`確定刪除工程「${name}」？此操作無法復原！`)) return;

  // 1. 先刪本地（畫面立即反應）
  const updated = { ...projects };
  delete updated[name];

  // 2. 更新目前工程
  const next = Object.keys(updated)[0] || "";
  setProjects(updated);
  setCurrentProject(next);

  // 3. 存本地
  saveProjects(updated);

  // 4. 刪雲端
  try {
    await deleteFromCloud(name);
  } catch (err) {
    console.error("雲端刪除失敗：", err);
  }
}

  return (
    <div className="bg-white p-4 rounded shadow mb-4 print-hidden">
      <h2 className="text-lg font-bold mb-3">工程管理</h2>

      <div className="flex flex-wrap gap-2">
        {Object.keys(projects).map(key => (
          <button
            key={key}
            onClick={() => setCurrentProject(key)}
            className={
              "px-3 py-1 rounded border " +
              (currentProject === key
                ? "bg-blue-600 text-white border-blue-600"
                : "bg-white text-gray-700 border-gray-400")
            }
          >
            {key}
          </button>
        ))}

        <button
          onClick={addProject}
          className="px-3 py-1 rounded bg-green-600 text-white font-bold"
        >
          ＋ 新增工程
        </button>

        {currentProject && (
          <button
            onClick={() => deleteProject(currentProject)}
            className="px-3 py-1 rounded bg-red-600 text-white"
          >
            刪除目前工程
          </button>
        )}
      </div>
    </div>
  );
}
/****************************************************
 * PART 4 — MaterialsPage（含設備名稱＋新增＋刪除＋列內編輯）
 ****************************************************/
function MaterialsPage({ materialDB, projectData, setProjectData }) {

  /* ------------------ 新增欄位 state ------------------ */
  const [equipName, setEquipName] = React.useState("");
  const [category, setCategory] = React.useState("");
  const [spec, setSpec] = React.useState("");
  const [length, setLength] = React.useState("");
  const [width, setWidth] = React.useState("");
  const [pcs, setPcs] = React.useState("");

  /* ------------------ 下拉資料 ------------------ */
  const categories = React.useMemo(() => {
    const s = new Set();
    materialDB.forEach(r => s.add(r.category));
    return [...s];
  }, [materialDB]);

  const specs = React.useMemo(() => {
    return materialDB.filter(r => r.category === category).map(r => r.spec);
  }, [category, materialDB]);

 const selectedRow = React.useMemo(() => {
    // 🚀 關鍵修正：將 purchaseDB 改回 materialDB
    // 並加入 .trim() 防止 Google Sheet 裡的空格導致匹配失敗
    return materialDB.find(r => 
      (r.category || "").trim() === (category || "").trim() && 
      (r.spec || "").trim() === (spec || "").trim()
    );
  }, [category, spec, materialDB]);

  const unitWeight = selectedRow ? Number(selectedRow.weight) : 0;
  const price = selectedRow ? Number(selectedRow.price) : 0;
  const isPlate = category.includes("板");

  /* ------------------ 計算重量 ------------------ */
  const weight = React.useMemo(() => {
    if (!pcs || !length) return 0;
    if (isPlate && !width) return 0;
    return isPlate
      ? Number(length) * Number(width) * unitWeight * Number(pcs)
      : unitWeight * Number(length) * Number(pcs);
  }, [length, width, pcs, isPlate, unitWeight]);

  const subtotal = Math.round(weight * price);

  /* ========================================================
   * 新增材料
   * ====================================================== */
  function addToList() {
    if (!category || !spec) {
      alert("請選擇分類與規格");
      return;
    }
    if (!length || !pcs || (isPlate && !width)) {
      alert("請完整輸入長度 / (寬度) / 數量");
      return;
    }

    const newItem = {
      type: "材料",
      equipName: equipName || "",
      category,
      spec,
      length: Number(length),
      width: isPlate ? Number(width) : null,
      pcs: Number(pcs),
      unitWeight,
      weight,
      price,
      subtotal
    };

    setProjectData({
      ...projectData,
      allItems: [...projectData.allItems, newItem]
    });

    setEquipName("");
    setSpec("");
    setLength("");
    setWidth("");
    setPcs("");
  }

  /* ========================================================
   * 刪除
   * ====================================================== */
  function deleteMaterial(idx) {
    const items = projectData.allItems.filter(i => i.type === "材料");
    const target = items[idx];
    const realIndex = projectData.allItems.indexOf(target);

    if (realIndex < 0) return;
    const update = [...projectData.allItems];
    update.splice(realIndex, 1);

    setProjectData({ ...projectData, allItems: update });
  }

  /* ========================================================
   * 列內編輯
   * ====================================================== */
  const [editIndex, setEditIndex] = React.useState(null);
  const [editData, setEditData] = React.useState({});

  function startEdit(idx) {
    const items = projectData.allItems.filter(i => i.type === "材料");
    const item = items[idx];

    const itemSpecs = materialDB
      .filter(r => r.category === item.category)
      .map(r => r.spec);

    setEditData({
      ...item,
      specs: itemSpecs
    });
    setEditIndex(idx);
  }

  function cancelEdit() {
    setEditIndex(null);
    setEditData({});
  }

  function saveEdit(idx) {
    const items = projectData.allItems.filter(i => i.type === "材料");
    const original = items[idx];
    const realIndex = projectData.allItems.indexOf(original);

    const dbRow = materialDB.find(
      r => r.category === editData.category && r.spec === editData.spec
    );

    const unitWeight = Number(dbRow.weight);
    const price = Number(dbRow.price);
    const isPlate = editData.category.includes("板");

    const newWeight = isPlate
      ? Number(editData.length) * Number(editData.width) * unitWeight * Number(editData.pcs)
      : unitWeight * Number(editData.length) * Number(editData.pcs);

    const newSubtotal = Math.round(newWeight * price);

    const newItem = {
      ...editData,
      unitWeight,
      weight: newWeight,
      price,
      subtotal: newSubtotal
    };

    const updated = [...projectData.allItems];
    updated[realIndex] = newItem;

    setProjectData({ ...projectData, allItems: updated });
    cancelEdit();
  }

  /* ========================================================
   * 撈材料
   * ====================================================== */
  const materialItems = projectData.allItems.filter(i => i.type === "材料");
  const totalWeight = materialItems.reduce((s, i) => s + (Number(i.weight) || 0), 0);

  /* ========================================================
   * Render
   * ====================================================== */
  return (
    <div className="p-4 bg-white rounded shadow">

      <h2 className="text-xl font-bold mb-4">材料</h2>

      {/* ●● 新增資料區 ●● */}
      <div className="mb-3">
        <label className="font-bold">設備名稱：</label>
        <input
          type="text"
          value={equipName}
          onChange={e => setEquipName(e.target.value)}
          className="border px-2 py-1 rounded ml-2 w-48"
          placeholder="可留白"
        />
      </div>

      <div className="mb-3">
        <label className="font-bold">分類：</label>
        <select
          value={category}
          onChange={e => {
            setCategory(e.target.value);
            setSpec("");
          }}
          className="border px-2 py-1 rounded ml-2"
        >
          <option value="">請選擇分類</option>
          {categories.map(c => (
            <option key={c}>{c}</option>
          ))}
        </select>
      </div>

      {category && (
        <div className="mb-3">
          <label className="font-bold">規格：</label>
          <select
            value={spec}
            onChange={e => setSpec(e.target.value)}
            className="border px-2 py-1 rounded ml-2"
          >
            <option value="">請選擇規格</option>
            {specs.map(s => (
              <option key={s}>{s}</option>
            ))}
          </select>
        </div>
      )}

      {category !== "" && (
        <>
          <div className="mb-3">
            <label className="font-bold">長度(m)：</label>
            <input
              type="number"
              value={length}
              onChange={e => setLength(e.target.value)}
              className="border px-2 py-1 rounded ml-2 w-32"
            />
          </div>

          {isPlate && (
            <div className="mb-3">
              <label className="font-bold">寬度(m)：</label>
              <input
                type="number"
                value={width}
                onChange={e => setWidth(e.target.value)}
                className="border px-2 py-1 rounded ml-2 w-32"
              />
            </div>
          )}

          <div className="mb-3">
            <label className="font-bold">數量：</label>
            <input
              type="number"
              value={pcs}
              onChange={e => setPcs(e.target.value)}
              className="border px-2 py-1 rounded ml-2 w-32"
            />
          </div>

          <div className="mb-3 p-3 bg-gray-50 border rounded">
            重量：<b>{weight.toFixed(2)}</b> kg ／ 小計：<b>{subtotal.toLocaleString()}</b> 元
          </div>

          <button
            onClick={addToList}
            className="px-4 py-2 bg-blue-600 text-white rounded font-bold"
          >
            ＋ 加入成本明細表
          </button>
        </>
      )}

      {/* ●● 表格列表 ●● */}
      <h3 className="text-lg font-bold mt-6 mb-2">材料成本明細</h3>

      <table className="table-auto w-full border mb-4">
        <thead>
          <tr className="bg-gray-100">
            <th className="border px-2 py-1">設備名稱</th>
            <th className="border px-2 py-1">分類</th>
            <th className="border px-2 py-1">規格</th>
            <th className="border px-2 py-1">長度(m)</th>
            <th className="border px-2 py-1">寬度(m)</th>
            <th className="border px-2 py-1">數量</th>
            <th className="border px-2 py-1">重量(kg)</th>
            <th className="border px-2 py-1">小計(元)</th>
            <th className="border px-2 py-1 w-32">操作</th>
          </tr>
        </thead>

        <tbody>
          {materialItems.map((i, idx) => {
            const rowIsPlate = i.category.includes("板");
            const isEdit = idx === editIndex;

            if (isEdit) {
              return (
                <tr key={idx} className="bg-yellow-50">
                  <td className="border px-2 py-1">
                    <input
                      type="text"
                      value={editData.equipName}
                      onChange={e => setEditData({ ...editData, equipName: e.target.value })}
                      className="border px-1 py-1 w-28"
                    />
                  </td>
                  <td className="border px-2 py-1">{i.category}</td>

                  <td className="border px-2 py-1">
                    <select
                      value={editData.spec}
                      onChange={e => setEditData({ ...editData, spec: e.target.value })}
                      className="border px-1 py-1 rounded w-28"
                    >
                      {editData.specs.map(s => (
                        <option key={s}>{s}</option>
                      ))}
                    </select>
                  </td>

                  <td className="border px-2 py-1">
                    <input
                      type="number"
                      value={editData.length}
                      onChange={e => setEditData({ ...editData, length: e.target.value })}
                      className="border px-1 py-1 w-20"
                    />
                  </td>

                  <td className="border px-2 py-1">
                    {rowIsPlate ? (
                      <input
                        type="number"
                        value={editData.width}
                        onChange={e => setEditData({ ...editData, width: e.target.value })}
                        className="border px-1 py-1 w-20"
                      />
                    ) : "—"}
                  </td>

                  <td className="border px-2 py-1">
                    <input
                      type="number"
                      value={editData.pcs}
                      onChange={e => setEditData({ ...editData, pcs: e.target.value })}
                      className="border px-1 py-1 w-20"
                    />
                  </td>

                  <td className="border px-2 py-1">{(i.weight || 0).toFixed(2)}</td>
                  <td className="border px-2 py-1">{i.subtotal.toLocaleString()}</td>

                  <td className="border px-2 py-1 text-center">
                    <button
                      onClick={() => saveEdit(idx)}
                      className="px-2 py-1 bg-green-600 text-white rounded mr-1"
                    >
                      儲存
                    </button>
                    <button
                      onClick={cancelEdit}
                      className="px-2 py-1 bg-gray-500 text-white rounded"
                    >
                      取消
                    </button>
                  </td>
                </tr>
              );
            }

            /* 一般列 */
            return (
              <tr key={idx}>
                <td className="border px-2 py-1">{i.equipName}</td>
                <td className="border px-2 py-1">{i.category}</td>
                <td className="border px-2 py-1">{i.spec}</td>
                <td className="border px-2 py-1">{i.length}</td>
                <td className="border px-2 py-1">{i.width ?? "—"}</td>
                <td className="border px-2 py-1">{i.pcs}</td>
                <td className="border px-2 py-1">{(i.weight || 0).toFixed(2)}</td>
                <td className="border px-2 py-1">{i.subtotal.toLocaleString()}</td>

                <td className="border px-2 py-1 text-center">
                  <button
                    onClick={() => startEdit(idx)}
                    className="px-2 py-1 bg-yellow-600 text-white rounded mr-1"
                  >
                    編輯
                  </button>
                  <button
                    onClick={() => deleteMaterial(idx)}
                    className="px-2 py-1 bg-red-600 text-white rounded"
                  >
                    刪除
                  </button>
                </td>
              </tr>
            );

          })}
        </tbody>
      </table>

      {/* 🚀 新增：依設備名稱分組的彙總表 */}
      <div className="mt-8 mb-4">
        <h3 className="text-md font-bold mb-2 text-gray-700 flex items-center">
          <span className="w-1 h-5 bg-blue-500 mr-2"></span>
          設備彙總統計
        </h3>
        <div className="overflow-hidden border rounded-lg shadow-sm">
          <table className="w-full text-sm text-left bg-white">
            <thead className="bg-blue-50 text-blue-800 font-bold">
              <tr>
                <th className="p-2 border-b">設備名稱</th>
                <th className="p-2 border-b text-right">分項總重量 (kg)</th>
                <th className="p-2 border-b text-right">分項材料金額 (元)</th>
              </tr>
            </thead>
            <tbody className="divide-y">
              {Object.entries(
                materialItems.reduce((acc, item) => {
                  // 抓取設備名稱，若空白則歸類為 "未命名設備"
                  const name = (item.equipName || "未命名設備").trim();
                  if (!acc[name]) acc[name] = { weight: 0, cost: 0 };
                  acc[name].weight += Number(item.weight) || 0;
                  acc[name].cost += Number(item.subtotal) || 0;
                  return acc;
                }, {})
              ).map(([name, data]) => (
                <tr key={name} className="hover:bg-gray-50">
                  <td className="p-2 font-medium">{name}</td>
                  <td className="p-2 text-right">
                    {data.weight.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",")}
                  </td>
                  <td className="p-2 text-right font-bold">

/****************************************************
 * PART X — PurchasePage（市購品）
 * 含設備名稱、分類/品項下拉、新增、編輯、刪除
 ****************************************************/
function PurchasePage({ purchaseDB, projectData, setProjectData }) {

  /* ------------------ 新增欄位 ------------------ */
  const [equipName, setEquipName] = React.useState("");
  const [category, setCategory] = React.useState("");
  const [spec, setSpec] = React.useState("");
  const [qty, setQty] = React.useState("");

  /* ------------------ 下拉選單 ------------------ */
  const categories = React.useMemo(() => {
    const s = new Set();
    purchaseDB.forEach(r => s.add(r.category));
    return [...s];
  }, [purchaseDB]);

  const specs = React.useMemo(() => {
    return purchaseDB
      .filter(r => r.category === category)
      .map(r => r.spec);
  }, [category, purchaseDB]);

  /* --- 在 PurchasePage 組件內部尋找並替換 --- */
const selectedRow = React.useMemo(() => {
  // 加上 .trim() 與防空值處理
  return purchaseDB.find(r => 
    (r.category || "").trim() === (category || "").trim() && 
    (r.spec || "").trim() === (spec || "").trim()
  );
}, [category, spec, purchaseDB]);

  const price = selectedRow ? Number(selectedRow.price) : 0;
  const subtotal = price * Number(qty || 0);

  /* ------------------ 新增明細 ------------------ */
  function addToList() {
    if (!category || !spec || !qty) {
      alert("請完整輸入！");
      return;
    }

    const item = {
      type: "市購品",
      equipment: equipName || "",
      category,
      spec,
      qty: Number(qty),
      price,
      subtotal
    };

    const updated = {
      ...projectData,
      allItems: [...projectData.allItems, item]
    };

    setProjectData(updated);

    setSpec("");
    setQty("");
  }

  /* ------------------ 明細列表 ------------------ */
  const items = projectData.allItems.filter(i => i.type === "市購品");

  /* ------------------ 編輯功能 ------------------ */
  const [editIndex, setEditIndex] = React.useState(null);
  const [editItem, setEditItem] = React.useState(null);

  function startEdit(idx) {
    const item = items[idx];

    const specs = purchaseDB
      .filter(r => r.category === item.category)
      .map(r => r.spec);

    setEditItem({
      ...item,
      specs
    });

    setEditIndex(idx);
  }

  function cancelEdit() {
    setEditIndex(null);
    setEditItem(null);
  }

  function saveEdit(idx) {
    const old = items[idx];

    const updated = {
      ...old,
      equipment: editItem.equipment,
      spec: editItem.spec,
      qty: Number(editItem.qty),
      price: Number(editItem.price),
      subtotal: Number(editItem.qty) * Number(editItem.price)
    };

    const all = [...projectData.allItems];
    all[projectData.allItems.indexOf(old)] = updated;

    setProjectData({ ...projectData, allItems: all });
    setEditIndex(null);
  }

  /* ------------------ 刪除 ------------------ */
  function deleteItem(idx) {
    if (!confirm("確定刪除？")) return;
    const target = items[idx];

    const updated = projectData.allItems.filter(i => i !== target);
    setProjectData({ ...projectData, allItems: updated });
  }

  /* ------------------ Render ------------------ */
  return (
    <div className="p-4 bg-white rounded shadow">

      <h2 className="text-xl font-bold mb-4">市購品</h2>

      {/* 設備名稱 */}

        <label className="font-bold">設備名稱：</label>

          type="text"

          onChange={e => setEquipName(e.target.value)}
          className="border px-2 py-1 ml-2 rounded w-48"
          placeholder="可留白"

      </div>

      {/* 分類 */}
      <div className="mb-3">
        <label className="font-bold">分類：</label>
        <select
          value={category}
          onChange={e => { setCategory(e.target.value); setSpec(""); }}
          className="border px-2 py-1 ml-2 rounded"
        >
          <option value="">請選擇分類</option>
          {categories.map(c => <option key={c}>{c}</option>)}
        </select>
      </div>

      {/* 品項 */}
      {category && (
        <div className="mb-3">
          <label className="font-bold">品項：</label>
          <select
            value={spec}

            <option value="">請選擇品項</option>
            {specs.map(s => <option key={s}>{s}</option>)}
          </select>
        </div>
      )}

      {/* 單價 */}
      {selectedRow && (
        <div className="p-3 bg-gray-50 border rounded mb-3">
          <p>單位：{selectedRow.unit}</p>
          <p>單價：<b>{price}</b> 元</p>

      {/* 數量 */}

        ＋ 加入成本明細表

    const newItem = {
      type: "運輸費用",
      // 🚀 修改點 1：確保存入雲端時欄位名稱統一為 equipment
      equipment: (equipName || "").trim(), 
      category: category.trim(),
      spec: spec.trim(),
      region: region.trim(),
      qty: Number(qty),
      unitPrice: Number(unitPrice || 0),
      subtotal: Number(subtotal || 0)
    };

    // 🚀 修改點 2：確保這裡呼叫的是會觸發 saveToCloud 的 setProjectData
    setProjectData({
      ...projectData,
      allItems: [...(projectData.allItems || []), newItem]
    });

    setEquipName(""); 
    setQty("");
  }

  /****************************************************
   * 刪除運輸費用
   ****************************************************/
  function deleteItem(idx) {
    const items = projectData.allItems.filter(i => i.type === "運輸費用");
    const target = items[idx];
    const realIndex = projectData.allItems.indexOf(target);
    if (realIndex < 0) return;

    const updated = [...projectData.allItems];
    updated.splice(realIndex, 1);

    setProjectData({ ...projectData, allItems: updated });
  }

  /****************************************************
   * 編輯模式（Inline Edit）
   ****************************************************/
  const [editIndex, setEditIndex] = React.useState(null);
  const [editData, setEditData] = React.useState({});

  function startEdit(idx) {
    const items = projectData.allItems.filter(i => i.type === "運輸費用");
    const item = items[idx];

    const itemSpecs = transportDB
      .filter(r => r.category === item.category)
      .map(r => r.spec);

    setEditData({
      ...item,
      specs: itemSpecs
    });

    setEditIndex(idx);
  }

  function cancelEdit() {
    setEditIndex(null);
    setEditData({});
  }

  function saveEdit(idx) {
    const items = projectData.allItems.filter(i => i.type === "運輸費用");
    const original = items[idx];
    const realIndex = projectData.allItems.indexOf(original);

    /* 用 DB 找最新單價 */
    const dbRow = transportDB.find(
      r =>
        r.category === editData.category &&
        r.spec === editData.spec &&
        r.region === editData.region
    );

    const unitPrice = dbRow ? Number(dbRow.price) : 0;
    const subtotal = Number(editData.qty) * unitPrice;

    const newItem = {
      ...editData,
      unitPrice,
      subtotal
    };

    const updated = [...projectData.allItems];
    updated[realIndex] = newItem;

    setProjectData({ ...projectData, allItems: updated });
    cancelEdit();
  }

  /****************************************************
   * 運輸項目列表
   ****************************************************/
  const items = projectData.allItems.filter(i => i.type === "運輸費用");

  return (
    <div className="p-4 bg-white rounded shadow">
      <h2 className="text-xl font-bold mb-4">運輸費用</h2>

      {/* 新增區 */}
      <div className="mb-3">
        <label className="font-bold">分類：</label>
        <select
          value={category}
          onChange={e => {
            setCategory(e.target.value);
            setSpec("");
          }}
          className="border px-2 py-1 rounded ml-2"
        >
          <option value="">請選擇分類</option>
          {categories.map(c => (
            <option key={c}>{c}</option>
          ))}
        </select>
      </div>

      {category && (
        <div className="mb-3">
          <label className="font-bold">規格：</label>
          <select
            value={spec}
            onChange={e => setSpec(e.target.value)}
            className="border px-2 py-1 rounded ml-2"
          >
            <option value="">請選擇規格</option>
            {specs.map(s => (
              <option key={s}>{s}</option>
            ))}
          </select>
        </div>
      )}

      {category && (
        <div className="mb-3">
          <label className="font-bold">地區：</label>
          <select
            value={region}
            onChange={e => setRegion(e.target.value)}
            className="border px-2 py-1 rounded ml-2"
          >
            <option value="">請選擇地區</option>
            {regions.map(r => (
              <option key={r}>{r}</option>
            ))}
          </select>
        </div>
      )}

      {category && (
        <>
          <div className="mb-3">
            <label className="font-bold">趟數：</label>
            <input
              type="number"
              value={qty}
              onChange={e => setQty(e.target.value)}
              className="border px-2 py-1 rounded ml-2 w-32"
            />
          </div>

          <div className="mb-3 p-3 bg-gray-50 border rounded">
            單趟費用：<b>{unitPrice.toLocaleString()}</b> 元 ／ 小計：  
            <b>{subtotal.toLocaleString()}</b> 元
          </div>

          <button
            onClick={addToList}
            className="px-4 py-2 bg-blue-600 text-white rounded font-bold"
          >
            ＋ 新增
          </button>
        </>
      )}

      {/* 明細表 */}
      <h3 className="text-lg font-bold mt-6 mb-2">運輸費用明細</h3>

      <table className="table-auto w-full border mb-4">
        <thead>
          <tr className="bg-gray-100">
            <th className="border px-2 py-1">分類</th>
            <th className="border px-2 py-1">規格</th>
            <th className="border px-2 py-1">地區</th>
            <th className="border px-2 py-1">趟數</th>
            <th className="border px-2 py-1">單趟費用</th>
            <th className="border px-2 py-1">小計</th>
            <th className="border px-2 py-1">操作</th>
          </tr>
        </thead>

        <tbody>
          {items.map((i, idx) => {
            const isEdit = editIndex === idx;

            if (isEdit) {
              return (
                <tr key={idx} className="bg-yellow-50">
                  <td className="border px-2 py-1">
                    <select
                      value={editData.category}
                      onChange={e =>
                        setEditData({ ...editData, category: e.target.value })
                      }
                      className="border px-1 py-1"
                    >
                      {categories.map(c => (
                        <option key={c}>{c}</option>

                    </select>
                  </td>

                  <td className="border px-2 py-1">
                    <select

                      onChange={e =>

                  <td className="border px-2 py-1">

/****************************************************
 * PART 8 — InstallPage（現場安裝）
 * - 支援設備名稱、自動抓單價
 * - 支援列內編輯：可修改數量、單價、設備名稱
 ****************************************************/
function InstallPage({ installDB, projectData, setProjectData }) {
  const [category, setCategory] = React.useState("");
  const [spec, setSpec] = React.useState("");
  const [qty, setQty] = React.useState("");
  const [equipName, setEquipName] = React.useState(""); 

  const [editIndex, setEditIndex] = React.useState(null);
  const [editItem, setEditItem] = React.useState(null);

  /***************** 工具函式 (保留原功能) *****************/
  function getSpecs(category) {
    return installDB
      .filter(r => (r.category || "").trim() === category.trim())
      .map(r => r.spec);
  }

  function findDBRow(category, spec) {
    return installDB.find(r => 
      (r.category || "").trim() === (category || "").trim() && 
      (r.spec || "").trim() === (spec || "").trim()
    );
  }

  /***************** 新增資料 (保留原功能) *****************/
  const selectedRow = React.useMemo(() => {
    return findDBRow(category, spec);
  }, [category, spec, installDB]);

  const price = selectedRow ? Number(selectedRow.price || 0) : 0;
  const subtotal = price * Number(qty || 0);

  function addToList() {
    if (!category || !spec || !qty) {
      alert("請選擇分類、規格並輸入數量");
      return;
    }

    const currentPrice = selectedRow ? Number(selectedRow.price) : 0;
    const currentUnit = selectedRow ? (selectedRow.unit || "") : "";

    const item = {
      type: "現場安裝",
      equipment: (equipName || "").trim(),
      category: category.trim(),
      spec: spec.trim(),
      unit: currentUnit.trim(),
      qty: Number(qty),
      price: currentPrice,
      subtotal: Number(qty) * currentPrice
    };

    setProjectData({
      ...projectData,
      allItems: [...(projectData.allItems || []), item]
    });

    setSpec("");
    setQty("");
    setEquipName("");
  }

  const items = (projectData.allItems || []).filter(i => i.type === "現場安裝");

  /***************** 編輯模式 (增強功能：支援編輯金額) *****************/
  function startEdit(idx) {
    const item = items[idx];
    setEditIndex(idx);
    setEditItem({ ...item }); // 複製資料到編輯狀態，包含單價
  }

  function saveEdit(idx) {
    const old = items[idx];
    const realIndex = projectData.allItems.indexOf(old);
    
    // 重新計算小計，確保手動改單價後金額正確
    const updatedItem = {
      ...editItem,
      qty: Number(editItem.qty || 0),
      price: Number(editItem.price || 0),
      subtotal: Number(editItem.qty || 0) * Number(editItem.price || 0)
    };
    
    const newAll = [...projectData.allItems];
    newAll[realIndex] = updatedItem;
    setProjectData({ ...projectData, allItems: newAll });
    setEditIndex(null);
    setEditItem(null);
  }

  return (
    <div className="p-4 bg-white rounded shadow text-sm">
      <h2 className="text-xl font-bold mb-4">現場安裝</h2>
      
      {/* 新增區塊 */}
      <div className="mb-3">
        <label className="font-bold">設備名稱：</label>
        <input type="text" value={equipName} onChange={e => setEquipName(e.target.value)} className="border px-2 py-1 rounded ml-2 w-48" placeholder="可留白" />
      </div>
      <div className="mb-3">
        <label className="font-bold">分類：</label>
        <select value={category} onChange={e => { setCategory(e.target.value); setSpec(""); }} className="border px-2 py-1 rounded ml-2">
          <option value="">請選擇</option>
          {[...new Set(installDB.map(r => r.category))].map(c => <option key={c} value={c}>{c}</option>)}
        </select>
      </div>
      {category && (
        <div className="mb-3">
          <label className="font-bold">規格：</label>
          <select value={spec} onChange={e => setSpec(e.target.value)} className="border px-2 py-1 rounded ml-2">
            <option value="">請選擇規格</option>
            {getSpecs(category).map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </div>
      )}
      {selectedRow && (
        <div className="mb-3 p-3 bg-gray-50 border rounded">
          <p>單位：{selectedRow.unit} ／ 單價：<b>{selectedRow.price}</b></p>
          <label className="font-bold">數量：</label>
          <input type="number" value={qty} onChange={e => setQty(e.target.value)} className="border px-2 py-1 rounded ml-2 w-32" />
          <p className="mt-2">小計：<b>{subtotal.toLocaleString()}</b> 元</p>
        </div>
      )}
      <button onClick={addToList} className="px-4 py-2 bg-blue-600 text-white rounded font-bold">＋ 加入成本明細表</button>

      {/* 表格區塊 */}
      <table className="w-full border mt-6 text-sm">
        <thead className="bg-gray-100">
          <tr>
            <th className="border p-2">設備</th>
            <th className="border p-2">項目</th>
            <th className="border p-2 w-20">數量</th>
            <th className="border p-2 w-28">單價</th>
            <th className="border p-2 w-28">小計</th>
            <th className="border p-2 w-32">操作</th>
          </tr>
        </thead>
        <tbody>
          {items.map((i, idx) => {
            const isEditing = editIndex === idx;
            return (
              <tr key={idx} className={isEditing ? "bg-yellow-50" : ""}>
                <td className="border p-1">
                  {isEditing ? (
                    <input className="w-full border p-1" value={editItem.equipment} onChange={e => setEditItem({...editItem, equipment: e.target.value})} />
                  ) : i.equipment}
                </td>
                <td className="border p-1">{i.spec}</td>
                <td className="border p-1 text-center">
                  {isEditing ? (
                    <input type="number" className="w-full border p-1 text-center" value={editItem.qty} onChange={e => setEditItem({...editItem, qty: e.target.value})} />
                  ) : i.qty}
                </td>
                <td className="border p-1 text-right">
                  {isEditing ? (
                    <input type="number" className="w-full border p-1 text-right" value={editItem.price} onChange={e => setEditItem({...editItem, price: e.target.value})} />
                  ) : (i.price || 0).toLocaleString()}
                </td>
                <td className="border p-1 text-right">
                  {isEditing ? (Number(editItem.qty || 0) * Number(editItem.price || 0)).toLocaleString() : (i.subtotal || 0).toLocaleString()}
                </td>
                <td className="border p-1 text-center">
                  {isEditing ? (
                    <button onClick={() => saveEdit(idx)} className="text-green-600 font-bold mr-2">儲存</button>
                  ) : (
                    <button onClick={() => startEdit(idx)} className="text-blue-600 mr-2">編輯</button>
                  )}
                  <button onClick={() => { if(confirm("刪除？")){ const newAll = projectData.allItems.filter(it => it !== i); setProjectData({...projectData, allItems: newAll}); }}} className="text-red-600">刪除</button>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
      
      {/* 總計區塊 */}
      <div className="mt-4 p-3 bg-gray-50 border-t-2 border-purple-500 rounded text-right">
        <div className="text-lg font-bold text-purple-700">
          現場安裝總金額合計：{items.reduce((sum, i) => sum + (i.subtotal || 0), 0).toLocaleString()} 元
        </div>
      </div>
    </div>
  );
}
/****************************************************
 * PART 9 — SummaryPage（總表）- 終極完整修正版
 ****************************************************/
function SummaryPage({ projectData, currentProject, updateProjectData }) {
  const chartRef = React.useRef(null);

  /*************** 1. 成本小計計算 ***************/
  const sumByType = (type) => {
    return (projectData.allItems || [])
      .filter((i) => i.type === type)
      .reduce((a, b) => a + (Number(b.subtotal) || 0), 0);
  };

  const materialSum = sumByType("材料");
  const purchaseSum = sumByType("市購品");
  const fabSum = sumByType("製作成本");
  const transSum = sumByType("運輸費用");
  const installSum = sumByType("現場安裝");

  const fiveTotal = materialSum + purchaseSum + fabSum + transSum + installSum;

  /*************** 2. 人工調整 ***************/
  const manualAdjustDetail = projectData.manualAdjustDetail || {
    material: 0, purchase: 0, fabrication: 0, transport: 0, install: 0,
  };
  const manualTotal = Object.values(manualAdjustDetail).reduce((a, b) => a + Number(b || 0), 0);
  const finalCost = fiveTotal + manualTotal; 

  /*************** 3. 管銷 / 毛利 / 售價 ***************/
  const adminRate = projectData.adminRate ?? 15;
  const profitRate = projectData.profitRate ?? 35;
  const floorPrice = projectData.floorPrice ?? 0;

  const adminFee = Math.round(finalCost * (adminRate / 100));
  const totalCostWithAdmin = finalCost + adminFee;
  const suggestPrice = Math.round(totalCostWithAdmin / (1 - profitRate / 100));
  const profitAmount = suggestPrice - totalCostWithAdmin;

  const floorProfit = floorPrice > 0 ? floorPrice - totalCostWithAdmin : 0;
  const floorProfitRate = floorPrice > 0 ? (floorProfit / floorPrice) * 100 : 0;

  /*************** 4. 數據更新函式 ***************/
  function handleSummaryUpdate(field, value) {
    updateProjectData({ ...projectData, [field]: value === "" ? 0 : Number(value) });
  }

  function updateManualAdjust(field, value) {
    const newDetail = { ...manualAdjustDetail, [field]: value === "" ? 0 : Number(value) };
    updateProjectData({ ...projectData, manualAdjustDetail: newDetail });
  }

  /*************** 5. 圓餅圖 (復原百分比) ***************/
  React.useEffect(() => {
    const ctx = document.getElementById("summaryChart");
    if (!ctx) return;
    if (window.summaryChart instanceof Chart) window.summaryChart.destroy();

    window.summaryChart = new Chart(ctx, {
      type: "pie",
      data: {
        labels: ["材料", "市購品", "製作", "運輸", "安裝"],
        datasets: [{
          data: [materialSum, purchaseSum, fabSum, transSum, installSum],
          backgroundColor: ["#4fa3d1", "#ffcc66", "#66cc99", "#ff6666", "#9999ff"],
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: "bottom" },
          datalabels: {
            display: true,
            color: "#000",
            font: { weight: "bold", size: 14 },
            formatter: (value, context) => {
              const sum = context.dataset.data.reduce((a, b) => a + b, 0);
              return sum === 0 ? "" : ((value / sum) * 100).toFixed(1) + "%";
            },
          },
        },
      },
      plugins: [ChartDataLabels],
    });
  }, [materialSum, purchaseSum, fabSum, transSum, installSum]);

  /*************** 🚀 6. 補回遺失的 exportExcel 函式 ***************/
  function exportExcel() {
    if (typeof XLSX === 'undefined') {
      alert("請確保已載入 XLSX 套件");
      return;
    }
    const wb = XLSX.utils.book_new();
    const today = new Date();
    const dateStr = today.toISOString().slice(0, 10).replace(/-/g, '');
    const fileName = `${dateStr}-${currentProject || "工程"}-成本分析.xlsx`;
    const rows = [];

    rows.push(["【成本總表摘要】"]);
    rows.push(["項目", "金額"]);
    rows.push(["五大成本小計", fiveTotal]);
    rows.push(["人工調整小計", manualTotal]);
    rows.push(["成本合計", finalCost]);
    rows.push(["管銷率(%)", adminRate]);
    rows.push(["管銷費", adminFee]);
    rows.push(["最終總成本", totalCostWithAdmin]);
    rows.push(["毛利率(%)", profitRate]);
    rows.push(["建議售價", suggestPrice]);
    rows.push(["預計利潤", profitAmount]);
    rows.push([]);

    const ws = XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, "成本分析總表");
    XLSX.writeFile(wb, fileName);
  }

  /*************** 7. UI 渲染 ***************/
  return (
    <div className="p-4 max-w-5xl mx-auto">
      <h2 className="text-2xl font-bold mb-4">成本分析總表</h2>
      <div className="w-full h-80 mb-6 bg-white rounded shadow p-2">
        <canvas id="summaryChart"></canvas>
      </div>

      <div className="bg-white p-4 rounded shadow mb-4">
        <h3 className="font-bold text-lg mb-4 border-b pb-2">五大成本 + 人工調整</h3>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-2">
          {[
            { label: "材料成本", val: materialSum, key: "material" },
            { label: "市購品成本", val: purchaseSum, key: "purchase" },
            { label: "製作成本", val: fabSum, key: "fabrication" },
            { label: "運輸費用", val: transSum, key: "transport" },
            { label: "現場安裝成本", val: installSum, key: "install" }
          ].map(item => (
            <React.Fragment key={item.key}>
              <div className="flex justify-between items-center py-1">
                <span className="font-bold">{item.label}：{item.val.toLocaleString()}</span>
              </div>
              <div className="flex items-center gap-2 mb-2">
                <span className="text-xs text-gray-400">人工調整：</span>
                <input
                  type="number"
                  value={manualAdjustDetail[item.key] || ""}
                  onChange={(e) => updateManualAdjust(item.key, e.target.value)}
                  className="border-b w-full text-right font-bold"
                />
              </div>
            </React.Fragment>
          ))}
        </div>
       {/* 🚀 修改點：新增顯示管銷金額 */}
        <div className="mt-4 pt-4 border-t border-dashed space-y-1 text-right">
          <p className="text-gray-600 text-sm">成本合計：{finalCost.toLocaleString()} 元</p>
          <p className="text-orange-600 font-bold">
            + 管銷費用 ({adminRate}%)：{adminFee.toLocaleString()} 元

/****************************************************
 * PART X — BackupArea（備份與還原）
 ****************************************************/
function BackupArea({ projects, setProjects, setCurrentProject }) {
  function exportBackup() {
    const blob = new Blob([JSON.stringify(projects, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `CostBackup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importBackup(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const json = JSON.parse(evt.target.result);
        setProjects(json);
        setCurrentProject(Object.keys(json)[0] || "");
        saveProjects(json);
        alert("✅ 匯入成功");
      } catch (err) { alert("❌ 格式錯誤"); }
    };
    reader.readAsText(file);
  }

  return (
    <div className="bg-white p-4 rounded shadow mb-4 print-hidden border-t-4 border-blue-500">
      <h3 className="font-bold mb-2">工程備份 / 還原</h3>
      <div className="flex gap-3">
        <button onClick={exportBackup} className="px-3 py-1 bg-green-600 text-white rounded text-sm font-bold">匯出備份</button>
        <label className="px-3 py-1 bg-blue-600 text-white rounded text-sm font-bold cursor-pointer">
          匯入還原
          <input type="file" accept=".json" className="hidden" onChange={importBackup} />
        </label>
      </div>
    </div>
  );
}

const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyKaX7bhCjK3cG2iUwqJrFkYAc_8Q2HCxuQdK67ZS2PLW6eO1dLoJVYdCyHhGUQg54k/exec";

// --- ☁️ 雲端讀取 (修正重量歸零版) ---
async function loadProjectsFromCloud() {
  setIsSyncing(true);
  try {
    const finalUrl = GAS_API_URL + (GAS_API_URL.includes('?') ? '&' : '?') + "t=" + new Date().getTime();
    const resp = await fetch(finalUrl, { method: "GET", mode: "cors" });
    const rawCloudData = await resp.json();
    
    const restoredProjects = {};
    Object.keys(rawCloudData).forEach(name => {
      const proj = rawCloudData[name];
      restoredProjects[name] = {
        manualAdjustDetail: proj.mad || { ...defaultManualAdjust },
        // 🚀 修改點：還原這三個關鍵欄位
        adminRate: Number(proj.ar || 15),
        profitRate: Number(proj.pr || 35),
        floorPrice: Number(proj.fp || 0),
allItems: (proj.allItems || []).map(i => {
  const typeMap = { "M": "材料", "P": "市購品", "F": "製作成本", "T": "運輸費用", "I": "現場安裝" };
  return {
    type: typeMap[i.t] || "材料",

    category: i.c || "", spec: i.s || "",
    qty: Number(i.q || 0), pcs: Number(i.q || 0),
    length: Number(i.l || 0),
    width: Number(i.w || 0), // 還原寬度
    // 🚀 修改點：優先讀取 wg，如果沒有才找舊的 weight，都沒有就給 0
    weight: Number(i.wg || i.weight || 0), 
    region: i.r || "",
    price: Number(i.p || 0), unitPrice: Number(i.p || 0),
    subtotal: Number(i.st || 0)
  };
})
      };
    });

 setProjects(restoredProjects);
    saveProjects(restoredProjects); // 存入手機 LocalStorage
    setHasUnsavedChanges(false);
  } catch (e) { console.error("雲端載入失敗", e); }
  finally { setIsSyncing(false); }
}
// --- ☁️ 雲端儲存 (極致壓縮 + 字數預警版) ---
async function saveToCloud(projectName, projectDetail) {
  if (!projectName) return;
  setIsSyncing(true);

  try {
    const slimItems = (projectDetail.allItems || []).map(item => {
      return {
        t: item.type === "材料" ? "M" : (item.type === "市購品" ? "P" : (item.type === "製作成本" ? "F" : (item.type === "運輸費用" ? "T" : "I"))),
        e: (item.equipName || item.equipment || "").trim(),
        c: (item.category || "").trim(),
        s: (item.spec || "").trim(),
        q: Number(item.qty || item.pcs || 0),
        l: Number(item.length || 0),
        w: Number(item.width || 0),
        wg: Number(item.weight || 0),
        r: (item.region || "").trim(),
        p: Number(item.price || item.unitPrice || 0),
        st: Number(item.subtotal || 0)
      };
    });

    // 🚀 修改點：將 adminRate, profitRate, floorPrice 加入 leanData 進行壓縮
    const leanData = {
      allItems: slimItems,
      mad: projectDetail.manualAdjustDetail || {},
      ar: Number(projectDetail.adminRate || 15),   // adminRate 縮寫為 ar
      pr: Number(projectDetail.profitRate || 35),  // profitRate 縮寫為 pr
      fp: Number(projectDetail.floorPrice || 0)    // floorPrice 縮寫為 fp
    };

    const payload = JSON.stringify({ projectName: projectName.toString(), data: leanData });
    
    // 🚀 核心預警邏輯
    const byteCount = payload.length;
    const usagePercent = Math.round((byteCount / 50000) * 100);
    
    // 更新狀態（請確保您在 App 內定義了這兩個 State，見下方第 2 點）
    setCurrentByteCount(byteCount);
    setStorageUsage(usagePercent);

    console.log(`📊 壓縮後長度: ${byteCount} 字 / 使用率: ${usagePercent}%`);

    // 🚩 若超過 95% 彈出強烈警告
    if (byteCount > 47500) {
      alert(`⚠️ 警告！該工程資料量已達 ${byteCount} 字 (${usagePercent}%)。已接近 Google 50,000 字上限，請考慮拆分工程名稱儲存！`);
    }

    await fetch(GAS_API_URL, { 
      method: "POST", 
      body: payload,
      mode: 'no-cors', 
      headers: { 'Content-Type': 'text/plain' } 
    });

    setTimeout(() => {
      setIsSyncing(false);
      setHasUnsavedChanges(false);
      console.log("✅ 雲端同步指令已發送");
    }, 1500);

  } catch (e) { 
    setIsSyncing(false);
    console.error("❌ 同步連線失敗:", e); 
  }
}

  // --- 📦 資料庫讀取 (方法 B：每次重整都強制更新) ---
  async function fetchCSV(url) {
    const text = await fetch(url).then(r => r.text());
    const rows = text.split("\n").map(r => r.trim());
    return { rows };
  }

  async function loadDB(name, url, setter) {
    try {
      // 🚀 加上快取清除參數，防止 Google 回傳舊的 400 錯誤
      const finalUrl = url + "&t=" + new Date().getTime();
      const response = await fetch(finalUrl);
      
      if (!response.ok) throw new Error("網路回應不正常");
      
      const text = await response.text();
      const rows = text.split("\n").map(r => r.trim());
      
      const parsed = rows.slice(1).map(r => r.split(",")).filter(r => r.length >= 2).map(r => {
        if (name === "material") return { category: (r[0]||"").trim(), spec: (r[1]||"").trim(), unit: r[2], weight: Number(r[3] || 0), price: Number(r[4] || 0) };
        if (name === "purchase") return { category: (r[0]||"").trim(), spec: (r[1]||"").trim(), unit: r[2], price: Number(r[3] || 0) };
        if (name === "fabrication") return { category: (r[0]||"").trim(), spec: (r[1]||"").trim(), unit: r[2], price: Number(r[3] || 0) };
        if (name === "transport") return { category: (r[0]||"").trim(), spec: (r[1]||"").trim(), region: r[2], price: Number(r[3] || 0), unit: r[4] || "台" };
        if (name === "install") return { category: (r[0]||"").trim(), spec: (r[1]||"").trim(), unit: r[2], price: Number(r[3] || 0) };
        return {};
      });
      setter(parsed);
      localStorage.setItem("db_" + name, JSON.stringify(parsed));
    } catch (e) {
      console.warn(`${name} 資料庫加載失敗，改用本地暫存`, e);
      const local = localStorage.getItem("db_" + name);
      if (local) setter(JSON.parse(local));
    }
  }

 React.useEffect(() => {
    loadDB("material", CSV_URLS.material, setMaterialDB);

  const projectData = projects[currentProject] || {

    profitRate: 35,

  };

 function updateProjectData(newData) {
    // 1. 立即標記為修改中，並在畫面顯示 (正在儲存您的修改)
    setHasUnsavedChanges(true);

    // 2. 獲取最新狀態並更新
    setProjects(prev => {

      saveToCloud(currentProject, newData);
      
      return updated;
    });

  return (

    📦 容量: {storageUsage}% ({currentByteCount} / 50,000)

</div>

  {/* 3. 刷新按鈕 */}
  <button
